name: Bible Reading Newsletter

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: Optional target date in YYYY-MM-DD.
        required: false
        type: string
  schedule:
    - cron: "30 20 * * *"

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    env:
      GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      BIBLE_READING_EMAIL_TO: kujah@poscointl.com
      TARGET_DATE: ${{ github.event.inputs.target_date || '' }}
      TZ: Asia/Seoul
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4

      - name: Validate Gmail secrets
        shell: bash
        run: |
          test -n "${GMAIL_USERNAME}" || (echo "GMAIL_USERNAME is missing" && exit 1)
          test -n "${GMAIL_APP_PASSWORD}" || (echo "GMAIL_APP_PASSWORD is missing" && exit 1)

      - name: Send newsletter
        run: |
          if [ -n "${TARGET_DATE}" ]; then
            python scripts/send_bible_reading_email.py --date "${TARGET_DATE}" --recipient "${BIBLE_READING_EMAIL_TO}"
          else
            python scripts/send_bible_reading_email.py --recipient "${BIBLE_READING_EMAIL_TO}"
          fi

      - name: Persist latest output
        if: success()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/bible_reading_newsletter/
          if git diff --cached --quiet; then
            echo "No newsletter changes to commit."
          else
            git commit -m "Update Bible reading newsletter output"
            git push
          fi
