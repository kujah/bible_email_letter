<chapter id=ch_job.25>
<text>
<cn>욥  25장</cn>
<div class='b'></div>
<div class='b'></div>
<div class='s1'>빌닷의 세 번째 말</div>
<verse id="v18025001"><ver><a class="verse_xref_link" href="//verse_menu:18025001:">1</a></ver><verse_body>수아 사람 빌닷이 대답하여 이르되</verse_body></verse>
<verse id="v18025002"><ver><a class="verse_xref_link" href="//verse_menu:18025002:">2</a></ver><verse_body>하나님은 주권과 위엄을 가지셨고 높은 곳에서 화평을 베푸시느니라</verse_body></verse>
<verse id="v18025003"><ver><a class="verse_xref_link" href="//verse_menu:18025003:">3</a></ver><verse_body>그의 군대를 어찌 계수할 수 있으랴 그가 비추는 광명을 받지 않은 자가 누구냐</verse_body></verse>
<verse id="v18025004"><ver><a class="verse_xref_link" href="//verse_menu:18025004:">4</a></ver><verse_body>그런즉 하나님 앞에서 사람이 어찌 의롭다 하며 여자에게서 난 자가 어찌 깨끗하다 하랴</verse_body></verse>
<verse id="v18025005"><ver><a class="verse_xref_link" href="//verse_menu:18025005:">5</a></ver><verse_body>보라 그의 눈에는 달이라도 빛을 발하지 못하고 별도 빛나지 못하거든</verse_body></verse>
<verse id="v18025006"><ver><a class="verse_xref_link" href="//verse_menu:18025006:">6</a></ver><verse_body>하물며 구더기 같은 사람, 벌레 같은 인생이랴</verse_body></verse>
</text>
</chapter>
