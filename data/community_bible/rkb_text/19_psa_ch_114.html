<chapter id=ch_psa.114>
<text>
<cn>시편  114편​</cn>
<div class='b'></div>
<div class='b'></div>
<verse id="v19114001"><ver><a class="verse_xref_link" href="//verse_menu:19114001:">1</a></ver><verse_body>이스라엘이 애굽에서 나오며 야곱의 집안이 언어가 다른 민족에게서 나올 때에</verse_body></verse>
<verse id="v19114002"><ver><a class="verse_xref_link" href="//verse_menu:19114002:">2</a></ver><verse_body>유다는 여호와의 성소가 되고 이스라엘은 그의 영토가 되었도다</verse_body></verse>
<verse id="v19114003"><ver><a class="verse_xref_link" href="//verse_menu:19114003:">3</a></ver><verse_body>바다가 보고 도망하며 요단은 물러갔으니</verse_body></verse>
<verse id="v19114004"><ver><a class="verse_xref_link" href="//verse_menu:19114004:">4</a></ver><verse_body>산들은 숫양들 같이 뛰놀며 작은 산들은 어린 양들 같이 뛰었도다</verse_body></verse>
<verse id="v19114005"><ver><a class="verse_xref_link" href="//verse_menu:19114005:">5</a></ver><verse_body>바다야 네가 도망함은 어찌함이며 요단아 네가 물러감은 어찌함인가</verse_body></verse>
<verse id="v19114006"><ver><a class="verse_xref_link" href="//verse_menu:19114006:">6</a></ver><verse_body>너희 산들아 숫양들 같이 뛰놀며 작은 산들아 어린 양들 같이 뛰놂은 어찌함인가</verse_body></verse>
<verse id="v19114007"><ver><a class="verse_xref_link" href="//verse_menu:19114007:">7</a></ver><verse_body>땅이여 너는 주 앞 곧 야곱의 하나님 앞에서 떨지어다</verse_body></verse>
<verse id="v19114008"><ver><a class="verse_xref_link" href="//verse_menu:19114008:">8</a></ver><verse_body>그가 반석을 쳐서 못물이 되게 하시며 차돌로 샘물이 되게 하셨도다</verse_body></verse>
</text>
</chapter>
