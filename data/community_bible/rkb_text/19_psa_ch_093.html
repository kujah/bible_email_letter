<text>
<cn>시편  93편​</cn>
<div class='b'></div>
<div class='b'></div>
<verse id="v19093001"><ver><a class="verse_xref_link" href="//verse_menu:19093001:">1</a></ver><verse_body>여호와께서 다스리시니 스스로 권위를 입으셨도다 여호와께서 능력의 옷을 입으시며 띠를 띠셨으므로 세계도 견고히 서서 흔들리지 아니하는도다</verse_body></verse>
<verse id="v19093002"><ver><a class="verse_xref_link" href="//verse_menu:19093002:">2</a></ver><verse_body>주의 보좌는 예로부터 견고히 섰으며 주는 영원부터 계셨나이다</verse_body></verse>
<verse id="v19093003"><ver><a class="verse_xref_link" href="//verse_menu:19093003:">3</a></ver><verse_body>여호와여 큰 물이 소리를 높였고 큰 물이 그 소리를 높였으니 큰 물이 그 물결을 높이나이다</verse_body></verse>
<verse id="v19093004"><ver><a class="verse_xref_link" href="//verse_menu:19093004:">4</a></ver><verse_body>높이 계신 여호와의 능력은 많은 물 소리와 바다의 큰 파도보다 크니이다</verse_body></verse>
<verse id="v19093005"><ver><a class="verse_xref_link" href="//verse_menu:19093005:">5</a></ver><verse_body>여호와여 주의 증거들이 매우 확실하고 거룩함이 주의 집에 합당하니 여호와는 영원무궁하시리이다</verse_body></verse>
</text>
</chapter>
