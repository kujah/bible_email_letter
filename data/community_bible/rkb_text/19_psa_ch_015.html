<chapter id=ch_psa.15>
<text>
<cn>시편  15편​</cn>
<div class='b'></div>
<div class='b'></div>
<div class='s1'>〔다윗의 시〕</div>
<verse id="v19015001"><ver><a class="verse_xref_link" href="//verse_menu:19015001:">1</a></ver><verse_body>여호와여 주의 장막에 머무를 자 누구오며 주의 성산에 사는 자 누구오니이까</verse_body></verse>
<verse id="v19015002"><ver><a class="verse_xref_link" href="//verse_menu:19015002:">2</a></ver><verse_body>정직하게 행하며 공의를 실천하며 그의 마음에 진실을 말하며</verse_body></verse>
<verse id="v19015003"><ver><a class="verse_xref_link" href="//verse_menu:19015003:">3</a></ver><verse_body>그의 혀로 남을 허물하지 아니하고 그의 이웃에게 악을 행하지 아니하며 그의 이웃을 비방하지 아니하며</verse_body></verse>
<verse id="v19015004"><ver><a class="verse_xref_link" href="//verse_menu:19015004:">4</a></ver><verse_body>그의 눈은 망령된 자를 멸시하며 여호와를 두려워하는 자들을 존대하며 그의 마음에 서원한 것은 해로울지라도 변하지 아니하며</verse_body></verse>
<verse id="v19015005"><ver><a class="verse_xref_link" href="//verse_menu:19015005:">5</a></ver><verse_body>이자를 받으려고 돈을 꾸어 주지 아니하며 뇌물을 받고 무죄한 자를 해하지 아니하는 자이니 이런 일을 행하는 자는 영원히 흔들리지 아니하리이다</verse_body></verse>
</text>
</chapter>
