<text>
<cn>시편  134편​</cn>
<div class='b'></div>
<div class='b'></div>
<div class='s1'>〔성전에 올라가는 노래〕</div>
<verse id="v19134001"><ver><a class="verse_xref_link" href="//verse_menu:19134001:">1</a></ver><verse_body>보라 밤에 여호와의 성전에 서 있는 여호와의 모든 종들아 여호와를 송축하라</verse_body></verse>
<verse id="v19134002"><ver><a class="verse_xref_link" href="//verse_menu:19134002:">2</a></ver><verse_body>성소를 향하여 너희 손을 들고 여호와를 송축하라</verse_body></verse>
<verse id="v19134003"><ver><a class="verse_xref_link" href="//verse_menu:19134003:">3</a></ver><verse_body>천지를 지으신 여호와께서 시온에서 네게 복을 주실지어다</verse_body></verse>
</text>
