<text>
<cn>시편  127편​</cn>
<div class='b'></div>
<div class='b'></div>
<div class='s1'>〔솔로몬의 시 곧 성전에 올라가는 노래〕</div>
<verse id="v19127001"><ver><a class="verse_xref_link" href="//verse_menu:19127001:">1</a></ver><verse_body>여호와께서 집을 세우지 아니하시면 세우는 자의 수고가 헛되며 여호와께서 성을 지키지 아니하시면 파수꾼의 깨어 있음이 헛되도다</verse_body></verse>
<verse id="v19127002"><ver><a class="verse_xref_link" href="//verse_menu:19127002:">2</a></ver><verse_body>너희가 일찍이 일어나고 늦게 누우며 수고의 떡을 먹음이 헛되도다 그러므로 여호와께서 그의 사랑하시는 자에게는 잠을 주시는도다</verse_body></verse>
<verse id="v19127003"><ver><a class="verse_xref_link" href="//verse_menu:19127003:">3</a></ver><verse_body>보라 자식들은 여호와의 기업이요 태의 열매는 그의 상급이로다</verse_body></verse>
<verse id="v19127004"><ver><a class="verse_xref_link" href="//verse_menu:19127004:">4</a></ver><verse_body>젊은 자의 자식은 장사의 수중의 화살 같으니</verse_body></verse>
<verse id="v19127005"><ver><a class="verse_xref_link" href="//verse_menu:19127005:">5</a></ver><verse_body>이것이 그의 화살통에 가득한 자는 복되도다 그들이 성문에서 그들의 원수와 담판할 때에 수치를 당하지 아니하리로다</verse_body></verse>
</text>
</chapter>
