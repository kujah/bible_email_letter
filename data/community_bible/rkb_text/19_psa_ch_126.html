<text>
<cn>시편  126편​</cn>
<div class='b'></div>
<div class='b'></div>
<div class='s1'>〔성전에 올라가는 노래〕</div>
<verse id="v19126001"><ver><a class="verse_xref_link" href="//verse_menu:19126001:">1</a></ver><verse_body>여호와께서 시온의 포로를 돌려 보내실 때에 우리는 꿈꾸는 것 같았도다</verse_body></verse>
<verse id="v19126002"><ver><a class="verse_xref_link" href="//verse_menu:19126002:">2</a></ver><verse_body>그 때에 우리 입에는 웃음이 가득하고 우리 혀에는 찬양이 찼었도다 그 때에 뭇 나라 가운데에서 말하기를 여호와께서 그들을 위하여 큰 일을 행하셨다 하였도다</verse_body></verse>
<verse id="v19126003"><ver><a class="verse_xref_link" href="//verse_menu:19126003:">3</a></ver><verse_body>여호와께서 우리를 위하여 큰 일을 행하셨으니 우리는 기쁘도다</verse_body></verse>
<verse id="v19126004"><ver><a class="verse_xref_link" href="//verse_menu:19126004:">4</a></ver><verse_body>여호와여 우리의 포로를 남방 시내들 같이 돌려 보내소서</verse_body></verse>
<verse id="v19126005"><ver><a class="verse_xref_link" href="//verse_menu:19126005:">5</a></ver><verse_body>눈물을 흘리며 씨를 뿌리는 자는 기쁨으로 거두리로다</verse_body></verse>
<verse id="v19126006"><ver><a class="verse_xref_link" href="//verse_menu:19126006:">6</a></ver><verse_body>울며 씨를 뿌리러 나가는 자는 반드시 기쁨으로 그 곡식 단을 가지고 돌아오리로다</verse_body></verse>
</text>
