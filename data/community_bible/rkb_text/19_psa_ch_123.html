<text>
<cn>시편  123편​</cn>
<div class='b'></div>
<div class='b'></div>
<div class='s1'>〔성전에 올라가는 노래〕</div>
<verse id="v19123001"><ver><a class="verse_xref_link" href="//verse_menu:19123001:">1</a></ver><verse_body>하늘에 계시는 주여 내가 눈을 들어 주께 향하나이다</verse_body></verse>
<verse id="v19123002"><ver><a class="verse_xref_link" href="//verse_menu:19123002:">2</a></ver><verse_body>상전의 손을 바라보는 종들의 눈 같이, 여주인의 손을 바라보는 여종의 눈 같이 우리의 눈이 여호와 우리 하나님을 바라보며 우리에게 은혜 베풀어 주시기를 기다리나이다</verse_body></verse>
<verse id="v19123003"><ver><a class="verse_xref_link" href="//verse_menu:19123003:">3</a></ver><verse_body>여호와여 우리에게 은혜를 베푸시고 또 은혜를 베푸소서 심한 멸시가 우리에게 넘치나이다</verse_body></verse>
<verse id="v19123004"><ver><a class="verse_xref_link" href="//verse_menu:19123004:">4</a></ver><verse_body>안일한 자의 조소와 교만한 자의 멸시가 우리 영혼에 넘치나이다</verse_body></verse>
</text>
</chapter>
