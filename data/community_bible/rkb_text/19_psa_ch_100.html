<text>
<cn>시편  100편​</cn>
<div class='b'></div>
<div class='b'></div>
<div class='s1'>〔감사의 시〕</div>
<verse id="v19100001"><ver><a class="verse_xref_link" href="//verse_menu:19100001:">1</a></ver><verse_body>온 땅이여 여호와께 즐거운 찬송을 부를지어다</verse_body></verse>
<verse id="v19100002"><ver><a class="verse_xref_link" href="//verse_menu:19100002:">2</a></ver><verse_body>기쁨으로 여호와를 섬기며 노래하면서 그의 앞에 나아갈지어다</verse_body></verse>
<verse id="v19100003"><ver><a class="verse_xref_link" href="//verse_menu:19100003:">3</a></ver><verse_body>여호와가 우리 하나님이신 줄 너희는 알지어다 그는 우리를 지으신 이요 우리는 그의 것이니 그의 백성이요 그의 기르시는 양이로다</verse_body></verse>
<verse id="v19100004"><ver><a class="verse_xref_link" href="//verse_menu:19100004:">4</a></ver><verse_body>감사함으로 그의 문에 들어가며 찬송함으로 그의 궁정에 들어가서 그에게 감사하며 그의 이름을 송축할지어다</verse_body></verse>
<verse id="v19100005"><ver><a class="verse_xref_link" href="//verse_menu:19100005:">5</a></ver><verse_body>여호와는 선하시니 그의 인자하심이 영원하고 그의 성실하심이 대대에 이르리로다</verse_body></verse>
</text>
</chapter>
