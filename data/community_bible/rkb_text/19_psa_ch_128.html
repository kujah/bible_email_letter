<text>
<cn>시편  128편​</cn>
<div class='b'></div>
<div class='b'></div>
<div class='s1'>〔성전에 올라가는 노래〕</div>
<verse id="v19128001"><ver><a class="verse_xref_link" href="//verse_menu:19128001:">1</a></ver><verse_body>여호와를 경외하며 그의 길을 걷는 자마다 복이 있도다</verse_body></verse>
<verse id="v19128002"><ver><a class="verse_xref_link" href="//verse_menu:19128002:">2</a></ver><verse_body>네가 네 손이 수고한 대로 먹을 것이라 네가 복되고 형통하리로다</verse_body></verse>
<verse id="v19128003"><ver><a class="verse_xref_link" href="//verse_menu:19128003:">3</a></ver><verse_body>네 집 안방에 있는 네 아내는 결실한 포도나무 같으며 네 식탁에 둘러 앉은 자식들은 어린 감람나무 같으리로다</verse_body></verse>
<verse id="v19128004"><ver><a class="verse_xref_link" href="//verse_menu:19128004:">4</a></ver><verse_body>여호와를 경외하는 자는 이같이 복을 얻으리로다</verse_body></verse>
<verse id="v19128005"><ver><a class="verse_xref_link" href="//verse_menu:19128005:">5</a></ver><verse_body>여호와께서 시온에서 네게 복을 주실지어다 너는 평생에 예루살렘의 번영을 보며</verse_body></verse>
<verse id="v19128006"><ver><a class="verse_xref_link" href="//verse_menu:19128006:">6</a></ver><verse_body>네 자식의 자식을 볼지어다 이스라엘에게 평강이 있을지로다</verse_body></verse>
</text>
</chapter>
