<text>
<cn>시편  120편​</cn>
<div class='b'></div>
<div class='b'></div>
<div class='s1'>〔성전에 올라가는 노래〕</div>
<verse id="v19120001"><ver><a class="verse_xref_link" href="//verse_menu:19120001:">1</a></ver><verse_body>내가 환난 중에 여호와께 부르짖었더니 내게 응답하셨도다</verse_body></verse>
<verse id="v19120002"><ver><a class="verse_xref_link" href="//verse_menu:19120002:">2</a></ver><verse_body>여호와여 거짓된 입술과 속이는 혀에서 내 생명을 건져 주소서</verse_body></verse>
<verse id="v19120003"><ver><a class="verse_xref_link" href="//verse_menu:19120003:">3</a></ver><verse_body>너 속이는 혀여 무엇을 네게 주며 무엇을 네게 더할꼬</verse_body></verse>
<verse id="v19120004"><ver><a class="verse_xref_link" href="//verse_menu:19120004:">4</a></ver><verse_body>장사의 날카로운 화살과 로뎀 나무 숯불이리로다</verse_body></verse>
<verse id="v19120005"><ver><a class="verse_xref_link" href="//verse_menu:19120005:">5</a></ver><verse_body>메섹에 머물며 게달의 장막 중에 머무는 것이 내게 화로다</verse_body></verse>
<verse id="v19120006"><ver><a class="verse_xref_link" href="//verse_menu:19120006:">6</a></ver><verse_body>내가 화평을 미워하는 자들과 함께 오래 거주하였도다</verse_body></verse>
<verse id="v19120007"><ver><a class="verse_xref_link" href="//verse_menu:19120007:">7</a></ver><verse_body>나는 화평을 원할지라도 내가 말할 때에 그들은 싸우려 하는도다</verse_body></verse>
</text>
