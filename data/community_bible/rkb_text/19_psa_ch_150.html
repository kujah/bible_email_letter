<chapter id=ch_psa.150>
<text>
<cn>시편  150편​</cn>
<div class='b'></div>
<div class='b'></div>
<verse id="v19150001"><ver><a class="verse_xref_link" href="//verse_menu:19150001:">1</a></ver><verse_body>할렐루야 그의 성소에서 하나님을 찬양하며 그의 권능의 궁창에서 그를 찬양할지어다</verse_body></verse>
<verse id="v19150002"><ver><a class="verse_xref_link" href="//verse_menu:19150002:">2</a></ver><verse_body>그의 능하신 행동을 찬양하며 그의 지극히 위대하심을 따라 찬양할지어다</verse_body></verse>
<verse id="v19150003"><ver><a class="verse_xref_link" href="//verse_menu:19150003:">3</a></ver><verse_body>나팔 소리로 찬양하며 비파와 수금으로 찬양할지어다</verse_body></verse>
<verse id="v19150004"><ver><a class="verse_xref_link" href="//verse_menu:19150004:">4</a></ver><verse_body>소고 치며 춤 추어 찬양하며 현악과 퉁소로 찬양할지어다</verse_body></verse>
<verse id="v19150005"><ver><a class="verse_xref_link" href="//verse_menu:19150005:">5</a></ver><verse_body>큰 소리 나는 제금으로 찬양하며 높은 소리 나는 제금으로 찬양할지어다</verse_body></verse>
<verse id="v19150006"><ver><a class="verse_xref_link" href="//verse_menu:19150006:">6</a></ver><verse_body>호흡이 있는 자마다 여호와를 찬양할지어다 할렐루야</verse_body></verse>
</text>
</chapter>
