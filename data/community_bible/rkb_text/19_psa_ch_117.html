<cn>시편  117편​</cn>
<div class='b'></div>
<div class='b'></div>
<verse id="v19117001"><ver><a class="verse_xref_link" href="//verse_menu:19117001:">1</a></ver><verse_body>너희 모든 나라들아 여호와를 찬양하며 너희 모든 백성들아 그를 찬송할지어다</verse_body></verse>
<verse id="v19117002"><ver><a class="verse_xref_link" href="//verse_menu:19117002:">2</a></ver><verse_body>우리에게 향하신 여호와의 인자하심이 크시고 여호와의 진실하심이 영원함이로다 할렐루야</verse_body></verse>
