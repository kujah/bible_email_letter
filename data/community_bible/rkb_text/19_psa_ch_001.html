<text>
<cn>시편  1편​</cn>
<div class='b'></div>
<div class='b'></div>
<div class='s1'>제 일 권</div>
<verse id="v19001001"><ver><a class="verse_xref_link" href="//verse_menu:19001001:">1</a></ver><verse_body>복 있는 사람은 악인들의 꾀를 따르지 아니하며 죄인들의 길에 서지 아니하며 오만한 자들의 자리에 앉지 아니하고</verse_body></verse>
<verse id="v19001002"><ver><a class="verse_xref_link" href="//verse_menu:19001002:">2</a></ver><verse_body>오직 여호와의 율법을 즐거워하여 그의 율법을 주야로 묵상하는도다</verse_body></verse>
<verse id="v19001003"><ver><a class="verse_xref_link" href="//verse_menu:19001003:">3</a></ver><verse_body>그는 시냇가에 심은 나무가 철을 따라 열매를 맺으며 그 잎사귀가 마르지 아니함 같으니 그가 하는 모든 일이 다 형통하리로다</verse_body></verse>
<verse id="v19001004"><ver><a class="verse_xref_link" href="//verse_menu:19001004:">4</a></ver><verse_body>악인들은 그렇지 아니함이여 오직 바람에 나는 겨와 같도다</verse_body></verse>
<verse id="v19001005"><ver><a class="verse_xref_link" href="//verse_menu:19001005:">5</a></ver><verse_body>그러므로 악인들은 심판을 견디지 못하며 죄인들이 의인들의 모임에 들지 못하리로다</verse_body></verse>
<verse id="v19001006"><ver><a class="verse_xref_link" href="//verse_menu:19001006:">6</a></ver><verse_body>무릇 의인들의 길은 여호와께서 인정하시나 악인들의 길은 망하리로다</verse_body></verse>
</text>
</chapter>
