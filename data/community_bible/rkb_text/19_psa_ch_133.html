<text>
<cn>시편  133편​</cn>
<div class='b'></div>
<div class='b'></div>
<div class='s1'>〔다윗의 시 곧 성전에 올라가는 노래〕</div>
<verse id="v19133001"><ver><a class="verse_xref_link" href="//verse_menu:19133001:">1</a></ver><verse_body>보라 형제가 연합하여 동거함이 어찌 그리 선하고 아름다운고</verse_body></verse>
<verse id="v19133002"><ver><a class="verse_xref_link" href="//verse_menu:19133002:">2</a></ver><verse_body>머리에 있는 보배로운 기름이 수염 곧 아론의 수염에 흘러서 그의 옷깃까지 내림 같고</verse_body></verse>
<verse id="v19133003"><ver><a class="verse_xref_link" href="//verse_menu:19133003:">3</a></ver><verse_body>헐몬의 이슬이 시온의 산들에 내림 같도다 거기서 여호와께서 복을 명령하셨나니 곧 영생이로다</verse_body></verse>
</text>
