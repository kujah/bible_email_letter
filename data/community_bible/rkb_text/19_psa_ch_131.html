<text>
<cn>시편  131편​</cn>
<div class='b'></div>
<div class='b'></div>
<div class='s1'>〔다윗의 시 곧 성전에 올라가는 노래〕</div>
<verse id="v19131001"><ver><a class="verse_xref_link" href="//verse_menu:19131001:">1</a></ver><verse_body>여호와여 내 마음이 교만하지 아니하고 내 눈이 오만하지 아니하오며 내가 큰 일과 감당하지 못할 놀라운 일을 하려고 힘쓰지 아니하나이다</verse_body></verse>
<verse id="v19131002"><ver><a class="verse_xref_link" href="//verse_menu:19131002:">2</a></ver><verse_body>실로 내가 내 영혼으로 고요하고 평온하게 하기를 젖 뗀 아이가 그의 어머니 품에 있음 같게 하였나니 내 영혼이 젖 뗀 아이와 같도다</verse_body></verse>
<verse id="v19131003"><ver><a class="verse_xref_link" href="//verse_menu:19131003:">3</a></ver><verse_body>이스라엘아 지금부터 영원까지 여호와를 바랄지어다</verse_body></verse>
</text>
</chapter>
